<!-- group-discussions.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Group Discussions</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- include your navbar here or via server-side include -->
  <div class="container" style="padding:2rem">
    <h1 id="groupTitle">Group</h1>

    <div class="card" style="padding:1rem; margin-bottom:1rem;">
      <h3>Start a new discussion</h3>
      <input id="threadTitle" placeholder="Thread title" style="width:100%; padding:0.5rem; margin-bottom:0.5rem;">
      <textarea id="threadContent" placeholder="Write your thread..." style="width:100%; min-height:100px; padding:0.5rem"></textarea>
      <div style="margin-top:0.5rem;">
        <button id="createThreadBtn" class="btn btn-primary">Create thread</button>
      </div>
    </div>

    <h2>Threads</h2>
    <div id="threadsList"></div>
  </div>

  <script src="api.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const groupId = params.get("groupId") || "1"; // default to 1 for testing
    const threadsList = document.getElementById("threadsList");
    const groupTitle = document.getElementById("groupTitle");

    async function loadThreads() {
      try {
        const threads = await apiFetch(`/groups/${groupId}/discussions`);
        threadsList.innerHTML = threads.map(t => `
          <a class="card" href="discussion-detail.html?discussionId=${t.id}">
            <h3>${t.title}</h3>
            <div class="muted">by ${t.author?.name || 'Member'} • ${new Date(t.createdAt).toLocaleString()}</div>
            <p style="color:#6b7280">${(t.content || '').slice(0,180)}${(t.content||'').length>180?'...':''}</p>
          </a>
        `).join('') || '<div class="muted">No threads yet.</div>';
      } catch (err) {
        console.error(err);
        threadsList.innerHTML = '<div class="muted">Failed to load threads</div>';
      }
    }

    document.getElementById("createThreadBtn").addEventListener("click", async () => {
      const title = document.getElementById("threadTitle").value.trim();
      const content = document.getElementById("threadContent").value.trim();
      if (!title || !content) return alert("Title and content required");

      try {
        await apiFetch(`/groups/${groupId}/discussions`, {
          method: "POST",
          body: JSON.stringify({ title, content })
        });
        document.getElementById("threadTitle").value = "";
        document.getElementById("threadContent").value = "";
        loadThreads();
      } catch (err) {
        if (err.status === 401) {
          if (confirm("Login required. Go to login?")) location.href = "login.html";
          return;
        }
        alert(err.message || "Failed to create thread");
      }
    });

    // initial
    loadThreads();
  </script>
</body>
</html>
