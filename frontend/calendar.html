<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Calendar — Local events platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cal-wrap { max-width:1100px; margin:2.5rem auto; display:grid; grid-template-columns: 1fr 360px; gap:1.25rem; }
    .calendar { background:white; padding:1rem; border-radius:12px; }
    .cal-grid { display:grid; grid-template-columns: repeat(7,1fr); gap:0.5rem; }
    .cal-day { padding:0.75rem; border-radius:8px; min-height:90px; background:#fff; border:1px solid transparent; transition:all .15s; }
    .cal-day:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(16,24,40,0.06); }
    .other-month { opacity:0.35; }
    .date-num { font-weight:700; }
    .dot { width:8px;height:8px;border-radius:999px;display:inline-block;margin-left:6px; }
    .event-list { display:flex; flex-direction:column; gap:0.5rem; margin-top:0.5rem; }
    .event-item { padding:0.5rem; border-radius:8px; background:#f9fafb; display:flex; gap:0.5rem; align-items:center; }
    @media (max-width:900px){ .cal-wrap{ grid-template-columns: 1fr; padding:1rem } .calendar { order: 2; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><div class="logo-icon">👥</div><span>Local events platform</span></a>
      <div class="nav-links">
        <a href="events.html" class="nav-link">Events</a>
        <a href="groups.html" class="nav-link">Groups</a>
        <a href="create-event.html" class="btn btn-outline">+ Create Event</a>
        <a href="profile.html" class="btn btn-primary">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container cal-wrap">
    <div class="calendar card" id="calendarCard">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
        <div style="display:flex; gap:0.5rem; align-items:center;">
          <button id="prevMonth" class="btn btn-outline">◀</button>
          <button id="nextMonth" class="btn btn-outline">▶</button>
          <h3 id="monthTitle" style="margin:0 0 0 0.75rem;"></h3>
        </div>
        <div>
          <button id="todayBtn" class="btn btn-primary">Today</button>
        </div>
      </div>

      <div class="cal-grid" id="dayNames" style="margin-bottom:0.5rem; font-weight:700; color:#6b7280;">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>

      <div class="cal-grid" id="datesGrid"></div>
    </div>

    <aside>
      <div class="card" style="padding:1rem;">
        <h3 style="margin-bottom:0.5rem;">Events on <span id="selectedDateLabel">—</span></h3>
        <div id="eventsForDay" class="event-list muted">Select a date to view events</div>
        <hr style="margin:0.75rem 0;">
        <a href="create-event.html" class="btn btn-primary" style="width:100%;">Create event</a>
        <a href="events.html" class="btn btn-outline" style="width:100%; margin-top:0.5rem;">All events</a>
      </div>
      <div style="height:0.5rem"></div>
      <div class="card" style="padding:1rem;">
        <h4>Legend</h4>
        <div style="display:flex; gap:0.5rem; margin-top:0.5rem; align-items:center;">
          <div style="width:10px;height:10px;background:#2563eb;border-radius:999px;"></div><div class="muted">In-person</div>
        </div>
        <div style="display:flex; gap:0.5rem; margin-top:0.5rem; align-items:center;">
          <div style="width:10px;height:10px;background:#10b981;border-radius:999px;"></div><div class="muted">Online</div>
        </div>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="api.js"></script>
<script>
/* ==========================
   GLOBALS + STATE
========================== */
let allEvents = [];      // all events from backend
let viewYear, viewMonth; // calendar view
let today = new Date();

// DOM handles
const datesGrid = document.getElementById('datesGrid');
const monthTitle = document.getElementById('monthTitle');
const selectedDateLabel = document.getElementById('selectedDateLabel');
const eventsForDay = document.getElementById('eventsForDay');

const prevMonthBtn = document.getElementById('prevMonth');
const nextMonthBtn = document.getElementById('nextMonth');
const todayBtn = document.getElementById('todayBtn');

// toast
const toastEl = document.getElementById('toast');
const showToast = (msg) => {
  toastEl.textContent = msg;
  toastEl.style.display = "block";
  setTimeout(() => toastEl.style.display = "none", 2000);
};


/* ==========================
   LOAD EVENTS FROM BACKEND
========================== */
async function loadEvents() {
  try {
    const res = await apiFetch("/events");
    allEvents = Array.isArray(res) ? res : res.events;

    // Normalize dates for calendar
    allEvents = allEvents.map(ev => ({
      ...ev,
      realDate: new Date(ev.date || ev.event_date)
    }));

    renderCalendar(viewYear, viewMonth);
  } catch (err) {
    console.error(err);
    showToast("Failed to load events");
  }
}


/* ==========================
   CALENDAR RENDER
========================== */
function renderCalendar(year, month) {
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startDay = firstDay.getDay();

  monthTitle.textContent = firstDay.toLocaleString("default", {
    month: "long",
    year: "numeric"
  });

  datesGrid.innerHTML = "";

  // previous month's tail
  const prevMonthDays = new Date(year, month, 0).getDate();
  for (let i = startDay - 1; i >= 0; i--) {
    const d = prevMonthDays - i;
    const cell = document.createElement("div");
    cell.className = "cal-day other-month";
    cell.innerHTML = `<div class="date-num">${d}</div>`;
    datesGrid.appendChild(cell);
  }

  // current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateObj = new Date(year, month, d);
    const iso = dateObj.toISOString().slice(0, 10);

    const eventsForThisDay = allEvents.filter(ev =>
      (new Date(ev.realDate)).toISOString().slice(0, 10) === iso
    );

    const cell = document.createElement("div");
    cell.className = "cal-day";

    // small colored dots under date
    let dots = "";
    if (eventsForThisDay.length > 0) {
      dots =
        `<div style="margin-top:4px;">` +
        eventsForThisDay
          .slice(0, 3)
          .map(
            ev =>
              `<span class="dot" style="background:${
                ev.isOnline ? '#10b981' : '#2563eb'
              }"></span>`
          )
          .join("") +
        `</div>`;
    }

    cell.innerHTML = `
      <div>
        <span class="date-num">${d}</span>
        ${dots}
      </div>
    `;

    cell.addEventListener("click", () => showEventsForDay(dateObj));
    datesGrid.appendChild(cell);
  }

  // fill next-month remaining cells
  const total = datesGrid.children.length;
  const fill = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= fill; i++) {
    const cell = document.createElement("div");
    cell.className = "cal-day other-month";
    cell.innerHTML = `<div class="date-num">${i}</div>`;
    datesGrid.appendChild(cell);
  }
}


/* ==========================
   SHOW EVENTS FOR SPECIFIC DAY
========================== */
function showEventsForDay(dateObj) {
  const iso = dateObj.toISOString().slice(0, 10);
  selectedDateLabel.textContent = dateObj.toLocaleDateString();

  const filtered = allEvents.filter(
    ev => new Date(ev.realDate).toISOString().slice(0, 10) === iso
  );

  if (!filtered.length) {
    eventsForDay.innerHTML = `<div class="muted">No events for this date.</div>`;
    return;
  }

  eventsForDay.innerHTML = filtered
    .map(ev => {
      return `
      <div class="event-item">
        <div style="width:10px;height:10px;border-radius:999px;background:${
          ev.isOnline ? "#10b981" : "#2563eb"
        }"></div>

        <div style="flex:1;">
          <div style="font-weight:700">${ev.title}</div>
          <div class="muted" style="font-size:0.9rem;">${
            ev.time || ""
          } • ${ev.location || "Online"}</div>
        </div>

        <div>
          <a href="event-detail.html?id=${ev.id}" class="btn btn-outline">View</a>
        </div>
      </div>
    `;
    })
    .join("");
}


/* ==========================
   NAVIGATION BUTTONS
========================== */
prevMonthBtn.addEventListener("click", () => {
  viewMonth--;
  if (viewMonth < 0) {
    viewMonth = 11;
    viewYear--;
  }
  renderCalendar(viewYear, viewMonth);
});

nextMonthBtn.addEventListener("click", () => {
  viewMonth++;
  if (viewMonth > 11) {
    viewMonth = 0;
    viewYear++;
  }
  renderCalendar(viewYear, viewMonth);
});

todayBtn.addEventListener("click", () => {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  renderCalendar(viewYear, viewMonth);
});


/* ==========================
   LOGIN / LOGOUT NAVBAR FIX
========================== */
function setupAuthUI() {
  const user = JSON.parse(localStorage.getItem("localUser") || "null");
  const createBtn = document.querySelector("#calendarCard + aside a.btn-primary");

  if (!user) {
    createBtn.href = "login.html";
    createBtn.onclick = () => alert("You must login to create events.");
  }
}

setupAuthUI();


/* ==========================
   INITIAL RUN
========================== */
viewYear = today.getFullYear();
viewMonth = today.getMonth();

loadEvents(); // load AND render calendar
</script>
</body>
</html>
