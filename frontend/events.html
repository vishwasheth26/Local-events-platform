<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Events - Local events platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><div class="logo-icon">👥</div><span>Local events platform</span></a>
            <div class="nav-links">
                <a href="events.html" class="nav-link active">📅 Events</a>
                <a href="groups.html" class="nav-link">👥 Groups</a>
                <a href="calendar.html" class="nav-link">🗓️ Calendar</a>
                <a href="create-event.html" class="btn btn-outline">+ Create Event</a>
                <a href="profile.html" class="btn btn-primary">👤 Profile</a>
            </div>
        </div>
    </nav>

    <div style="background: white; border-bottom: 1px solid #e5e7eb; padding: 2rem 1rem;">
        <div class="container">
            <h1 style="font-size: 2.5rem; font-weight: bold; margin-bottom: 0.5rem;">Discover events</h1>
            <p style="color: #6b7280;">Find your next experience</p>
        </div>
    </div>

    <div class="container" style="padding: 2rem 1rem;">
        <div style="display: grid; grid-template-columns: 300px 1fr; gap: 2rem;">
            <div>
                <div class="card" style="padding: 1.5rem;">
                    <h3 style="font-weight: bold; margin-bottom: 1.5rem;">🔍 Filters</h3>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Category</label>
                        <select id="categoryFilter" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Date</label>
                        <select id="dateFilter" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                            <option value="all">Any date</option>
                            <option value="today">Today</option>
                            <option value="week">This week</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Price</label>
                        <select id="priceFilter" style="width: 100%; padding: 0.5rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                            <option value="all">Any price</option>
                            <option value="free">Free</option>
                            <option value="paid">Paid</option>
                        </select>
                    </div>
                </div>
            </div>

            <div>
                <div style="margin-bottom: 1.5rem;">
                    <input type="text" id="searchInput" placeholder="Search events..." style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.5rem; border: 1px solid #e5e7eb; border-radius: 8px;">
                </div>
                <p style="margin-bottom: 1.5rem; color: #6b7280;"><strong id="eventCount">0</strong> events found</p>
                <div class="grid grid-2" id="eventsGrid"></div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
<script>
const categoryFilter = document.getElementById('categoryFilter');
const dateFilter = document.getElementById('dateFilter');
const priceFilter = document.getElementById('priceFilter');
const searchInput = document.getElementById('searchInput');
const eventsGrid = document.getElementById('eventsGrid');
const eventCount = document.getElementById('eventCount');

let allCategories = [];
let loadedEvents = [];

async function loadEvents() {
    eventsGrid.innerHTML = `<div class="muted">Loading events...</div>`;

    // PRIMARY LOAD
    loadedEvents = await apiFetch("/events");

    // CREATE CATEGORY DROPDOWN
    allCategories = [...new Set(loadedEvents.map(e => e.category))];

    allCategories.forEach(cat => {
        categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
    });

    renderEvents(loadedEvents);
}

// MAIN RENDER FUNCTION
function renderEvents(list) {
    eventCount.textContent = list.length;

    eventsGrid.innerHTML = list.map(event => `
        <a href="event-detail.html?id=${event.id}" class="card">
            <div style="position: relative;">
                <img src="${event.image}" class="card-image">
                <span class="badge">${event.price}</span>
                ${event.isOnline ? '<span class="badge" style="left: .75rem;right:auto;background:#10b981;color:white;">Online</span>' : ''}
            </div>
            <div class="card-content">
                <div class="card-category">${event.category}</div>
                <h3 class="card-title">${event.title}</h3>
                <div class="card-info">
                    <div class="info-item">📅 ${new Date(event.date).toLocaleDateString()}</div>
                    <div class="info-item">⏰ ${event.time}</div>
                    <div class="info-item">📍 ${event.location}</div>
                    <div class="info-item">👥 ${event.attendees} attending</div>
                </div>
            </div>
        </a>
    `).join('');
}

// TRIGGERS ADVANCED SEARCH
async function runSearch() {
    const options = {
        text: searchInput.value,
        category: categoryFilter.value,
    };

    // Date filter mapping
    const todayIso = new Date().toISOString().slice(0,10);

    if (dateFilter.value === "today") {
        options.startDate = todayIso;
        options.endDate = todayIso;
    } else if (dateFilter.value === "week") {
        const now = new Date();
        const weekLater = new Date(now.getTime() + (7*24*60*60*1000));
        options.startDate = now.toISOString().slice(0,10);
        options.endDate = weekLater.toISOString().slice(0,10);
    }

    // Price filter
    if (priceFilter.value !== "all") {
        options.price = priceFilter.value;
    }

    const results = await searchEventsAdvanced(options);
    renderEvents(results);
}

// BINDINGS
categoryFilter.addEventListener("change", runSearch);
dateFilter.addEventListener("change", runSearch);
priceFilter.addEventListener("change", runSearch);
searchInput.addEventListener("input", runSearch);

// INITIAL LOAD
loadEvents();
</script>
</body>
</html>
