<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Local events platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .profile-wrap { max-width: 1100px; margin: 2.5rem auto; display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items:start; }
    .avatar { width:100%; height:280px; object-fit:cover; border-radius:12px; }
    .badge { margin-top:0.5rem; display:inline-block; }
    .muted { color:#6b7280; }
    @media (max-width:900px){ .profile-wrap{ grid-template-columns: 1fr; padding:1rem } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><div class="logo-icon">👥</div><span>Local events platform</span></a>
      <div class="nav-links">
        <a href="events.html" class="nav-link">Events</a>
        <a href="groups.html" class="nav-link">Groups</a>
        <a href="create-event.html" class="btn btn-outline">+ Create Event</a>
        <a href="login.html" class="btn btn-primary">Login</a>
      </div>
    </div>
  </nav>

  <main class="container profile-wrap">
    <aside>
      <div class="card" style="padding:1.25rem;">
        <img id="avatar" class="avatar" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200" alt="avatar">
        <h2 id="pname" style="margin-top:0.75rem;"></h2>
        <div id="pemail" class="muted"></div>
        <div id="plocation" class="muted" style="margin-top:0.25rem;"></div>

        <div style="margin-top:1rem;">
          <button id="editBtn" class="btn btn-outline" style="width:100%; margin-bottom:0.5rem;">Edit profile</button>
          <button id="logout" class="btn btn-primary" style="width:100%;">Logout</button>
        </div>

        <div style="margin-top:1rem;">
          <h4 style="margin-bottom:0.5rem;">Interests</h4>
          <div id="interestList" style="display:flex;flex-wrap:wrap;gap:0.5rem;"></div>
        </div>
      </div>
    </aside>

    <section>
      <div class="card" style="padding:1.25rem; margin-bottom:1rem;">
        <h3>About</h3>
        <p id="pbio" class="muted"></p>
      </div>

      <div class="card" style="padding:1.25rem; margin-bottom:1rem;">
        <h3>Upcoming / Attended events</h3>
        <div id="userEvents" style="display:grid; gap:0.75rem; margin-top:0.75rem;"></div>
      </div>

      <div class="card" style="padding:1.25rem;">
        <h3>Joined groups</h3>
        <div id="userGroups" style="display:grid; gap:0.75rem; margin-top:0.75rem;"></div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" style="display:none"></div>

 <script src="api.js"></script>
<script>
  const toast = (msg) => {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => (t.style.display = "none"), 2500);
  };

  async function loadProfile() {
    const token = auth.getToken();
    if (!token) {
      toast("Please log in first.");
      return setTimeout(() => (window.location.href = "login.html"), 900);
    }

    try {
      // GET PROFILE FROM BACKEND
      const profile = await apiFetch("/users/profile");

      document.getElementById("avatar").src =
        profile.avatar ||
        "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200";

      document.getElementById("pname").textContent = profile.name;
      document.getElementById("pemail").textContent = profile.email;
      document.getElementById("plocation").textContent =
        profile.location || "No location";
      document.getElementById("pbio").textContent =
        profile.bio || "No bio added yet.";

      // ---- Load Interests (if you implement interests later) ----
      const il = document.getElementById("interestList");
      il.innerHTML = "";
      const interests = profile.interests || ["Technology", "Music"];
      interests.forEach((i) => {
        const chip = document.createElement("span");
        chip.className = "btn btn-outline";
        chip.style.fontSize = "0.9rem";
        chip.textContent = i;
        il.appendChild(chip);
      });

      // ---- Load Events user RSVP’d / Created ----
      const rsvpData = await apiFetch("/rsvp/mine");
      const ue = document.getElementById("userEvents");

      if (!rsvpData.length) {
        ue.innerHTML = `<div class="muted">You have not joined any events yet.</div>`;
      } else {
        ue.innerHTML = rsvpData
          .map((r) => {
            const e = r.Event || r.event;
            if (!e) return "";
            return `
              <a href="event-detail.html?id=${e.id}" class="card" 
                 style="display:flex; gap:1rem; padding:0.75rem; align-items:center;">
                <img src="${
                  e.image ||
                  "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=200"
                }" 
                style="width:72px;height:72px;object-fit:cover;border-radius:8px;">
                <div style="flex:1;">
                  <div style="font-weight:700">${e.title}</div>
                  <div class="muted" style="font-size:0.9rem;">
                    ${new Date(e.date).toLocaleDateString()} • ${
              e.location || "Online"
            }
                  </div>
                </div>
              </a>
            `;
          })
          .join("");
      }

      // ---- Groups section (You haven't built this yet) ----
      const ug = document.getElementById("userGroups");
      ug.innerHTML = `
        <div class="muted">
          Groups feature coming soon…
        </div>
      `;
    } catch (err) {
      console.error("Profile error:", err);
      toast("Session expired. Please login again.");
      auth.clear();
      localStorage.removeItem("localUser");
      setTimeout(() => (window.location.href = "login.html"), 1000);
    }
  }

  // Logout
  document.getElementById("logout").addEventListener("click", () => {
    auth.clear();
    localStorage.removeItem("localUser");
    toast("Logged out");
    setTimeout(() => (window.location.href = "index.html"), 900);
  });

  loadProfile();
</script>

</body>
</html>
