<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Event — Local events platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .form-wrap { max-width:900px; margin:2.5rem auto; }
    .grid-2cols { display:grid; grid-template-columns: 1fr 300px; gap:1rem; }
    .input { width:100%; padding:0.75rem 1rem; border-radius:8px; border:1px solid #e5e7eb; }
    .muted { color:#6b7280; }
    @media (max-width:900px){ .grid-2cols{ grid-template-columns:1fr; padding:1rem } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><div class="logo-icon">👥</div><span>Local events platform</span></a>
      <div class="nav-links">
        <a href="events.html" class="nav-link">Events</a>
        <a href="calendar.html" class="nav-link">Calendar</a>
        <a href="profile.html" class="btn btn-outline">Profile</a>
      </div>
    </div>
  </nav>

  <main class="container form-wrap">
    <div class="card" style="padding:1.25rem;">
      <h1 style="margin-bottom:0.25rem;">Create an event</h1>
      <p class="muted">Fill in details and publish. Your event will be saved in local storage (demo mode).</p>

      <div style="margin-top:1rem;" class="grid-2cols">
        <div>
          <label class="muted">Event title</label>
          <input id="title" class="input" placeholder="e.g., Monday JavaScript Study Group">

          <div style="display:flex; gap:.75rem; margin-top:0.75rem;">
            <div style="flex:1;">
              <label class="muted">Category</label>
              <select id="category" class="input"></select>
            </div>
            <div style="width:160px;">
              <label class="muted">Date</label>
              <input id="date" class="input" type="date">
            </div>
          </div>

          <div style="display:flex; gap:.75rem; margin-top:0.75rem;">
            <div style="flex:1;">
              <label class="muted">Time</label>
              <input id="time" class="input" type="time">
            </div>
            <div style="width:160px;">
              <label class="muted">Price</label>
              <input id="price" class="input" placeholder="Free or $20">
            </div>
          </div>

          <div style="margin-top:0.75rem;">
            <label class="muted">Location</label>
            <input id="location" class="input" placeholder="Address or 'Online'">
          </div>

          <div style="margin-top:0.75rem;">
            <label class="muted">Max attendees</label>
            <input id="maxAtt" class="input" type="number" min="1" placeholder="e.g., 50">
          </div>

          <div style="margin-top:0.75rem;">
            <label class="muted">Description</label>
            <textarea id="description" class="input" rows="6" placeholder="Give attendees a clear idea of what to expect"></textarea>
          </div>

          <div style="display:flex; gap:.5rem; margin-top:0.75rem;">
            <button id="createBtn" class="btn btn-primary">Create event</button>
            <a href="events.html" class="btn btn-outline">Cancel</a>
          </div>
        </div>

        <div>
          <div class="card" style="padding:1rem;">
            <label class="muted">Online event?</label>
            <div style="display:flex; gap:.5rem; margin-top:0.5rem;">
              <button id="isOnlineYes" class="btn btn-outline">Online</button>
              <button id="isOnlineNo" class="btn btn-outline">In-person</button>
            </div>

            <hr style="margin:0.75rem 0;">
            <label class="muted">Cover image URL</label>
            <input id="image" class="input" placeholder="https://images.unsplash.com/..." />
            <div style="margin-top:0.75rem;">
              <label class="muted">Organizer email</label>
              <input id="organizerEmail" class="input" placeholder="organizer@example.com">
            </div>

            <div style="margin-top:1rem; text-align:center;">
              <div id="previewWrap" style="border-radius:8px; overflow:hidden;">
                <img id="previewImg" src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800" style="width:100%; height:160px; object-fit:cover;">
              </div>
              <p class="muted" style="margin-top:0.5rem;">Preview</p>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="toast" class="toast" style="display:none"></div>

  <script src="api.js"></script>
  <script>
    // Simple toast helper
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast";
      toast.style.display = "block";
      setTimeout(() => (toast.style.display = "none"), 3000);
    }

    // Default categories if you want to populate
    const defaultCategories = [
      "Tech",
      "Workshops",
      "Networking",
      "Music",
      "Sports",
      "Arts",
      "Study Group",
      "General"
    ];

    // fill category dropdown
    const catSelect = document.getElementById("category");
    defaultCategories.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      catSelect.appendChild(opt);
    });

    // Handle online/in-person toggle
    let isOnline = false;
    const onlineYes = document.getElementById("isOnlineYes");
    const onlineNo = document.getElementById("isOnlineNo");

    function updateOnlineButtons() {
      onlineYes.classList.toggle("btn-primary", isOnline);
      onlineNo.classList.toggle("btn-primary", !isOnline);
      onlineYes.classList.toggle("btn-outline", !isOnline);
      onlineNo.classList.toggle("btn-outline", isOnline);
    }
    onlineYes.addEventListener("click", () => { isOnline = true; updateOnlineButtons(); });
    onlineNo.addEventListener("click", () => { isOnline = false; updateOnlineButtons(); });
    updateOnlineButtons();

    // Preview image live update
    const previewImg = document.getElementById("previewImg");
    const imageInput = document.getElementById("image");
    imageInput.addEventListener("input", () => {
      const url = imageInput.value.trim();
      if (url) previewImg.src = url;
    });

    // Create button handler (the page doesn't have a <form id="eventForm"> so use button)
    const createBtn = document.getElementById("createBtn");
    createBtn.addEventListener("click", async (e) => {
      e.preventDefault();

      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;
      const location = document.getElementById("location").value.trim();
      const category = document.getElementById("category").value;
      // your HTML uses id="maxAtt"
      const maxAtt = parseInt(document.getElementById("maxAtt").value || "0", 10);
      const image = document.getElementById("image").value.trim();
      const organizerEmail = document.getElementById("organizerEmail").value.trim();
      const price = document.getElementById("price").value.trim() || "Free";

      // Validate required fields
      if (!title || !date || !location) {
        showToast("Please fill title, date and location");
        return;
      }

      const payload = {
        title,
        description,
        date,                // controller will accept date or event_date
        time,
        location,
        category,
        maxAttendees: isNaN(maxAtt) ? 0 : maxAtt,
        image,
        isOnline,
        price,
        organizerEmail
      };

      try {
        // POST /api/events (authenticated route)
        const res = await apiFetch("/events", {
          method: "POST",
          body: JSON.stringify(payload)
        });

        showToast("Event created successfully!");

        // Redirect to the new event detail (controller returns { event })
        const newId = (res.event && res.event.id) || res.id;
        setTimeout(() => {
          if (newId) window.location.href = `event-detail.html?id=${newId}`;
          else window.location.href = "events.html";
        }, 900);
      } catch (err) {
        console.error("Create event error:", err);
        if (err.status === 401) {
          alert("You must log in to create an event.");
          window.location.href = "login.html";
          return;
        }
        showToast(err.message || "Failed to create event");
      }
    });
  </script>
</body>
</html>
